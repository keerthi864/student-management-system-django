<h1>Register Page</h1>

<form method="POST">

    {% csrf_token %}

    <input
        type="text"
        name="username"
        placeholder="Enter Username"
    >

    <br><br>

    <input
        type="password"
        name="password"
        placeholder="Enter Password"
    >

    <br><br>

    <button type="submit">
        Register
    </button>

</form>

<br>

<a href="/login/">
    Already have account? Login
</a>
