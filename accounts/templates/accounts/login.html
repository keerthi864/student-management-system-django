{% load static %}

<link rel="stylesheet" href="{% static 'css/style.css' %}">

<h1>Login Page</h1>

<form method="POST">

    {% csrf_token %}

    <input
        type="text"
        name="username"
        placeholder="Enter Username"
    >

    <br><br>

    <input
        type="password"
        name="password"
        placeholder="Enter Password"
    >

    <br><br>

    <button type="submit">
        Login
    </button>

</form>

<br>

<a href="/register/">
    New user? Register
</a>
