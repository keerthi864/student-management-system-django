<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!DOCTYPE html>
<html>
<head>
    <title>Student Detail</title>

    <style>

        body{
            font-family: Arial;
            background-color: #f2f2f2;
            padding: 40px;
        }

        .card{
            background-color: white;
            padding: 30px;
            width: 400px;
            border-radius: 10px;
        }

        img{
            border-radius: 10px;
            margin-bottom: 20px;
        }

        a{
            text-decoration: none;
            color: blue;
        }

    </style>

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card p-4 shadow">

        <h1 class="mb-4">
            {{ student.name }}
        </h1>

        {% if student.image %}

        <img
        src="{{ student.image.url }}"
        class="img-fluid rounded mb-4"
        style="
        width:250px;
        height:250px;
        object-fit:cover;
        ">

        {% endif %}

        <h4>
            Age : {{ student.age }}
        </h4>

        <h4>
            Owner : {{ student.user.username }}
        </h4>

        <h5 class="mt-3">
            Created :
            {{ student.created_at }}
        </h5>

        <div class="mt-4 d-flex gap-2">

            <a
            href="/update/{{ student.id }}/"
            class="btn btn-warning">

                Update

            </a>

            <a
            href="/delete/{{ student.id }}/"
            class="btn btn-danger">

                Delete

            </a>

            <a
            href="/"
            class="btn btn-dark">

                Back

            </a>

        </div>

    </div>

</div>

</body>
</html>
