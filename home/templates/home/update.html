<h1>Update Student</h1>

<form method="POST" enctype="multipart/form-data">

    {% csrf_token %}

    <input
        type="text"
        name="student_name"
        value="{{ student.name }}"
    >

    <br><br>

    <input
        type="number"
        name="student_age"
        value="{{ student.age }}"
    >

    <br><br>

    <input type="file" name="student_image">

    <button type="submit">
        Update
    </button>

</form>
